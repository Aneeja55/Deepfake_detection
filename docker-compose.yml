version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepfake-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Override at build time with: REACT_APP_API_URL=http://<YOUR_EC2_IP>:8000 docker-compose up --build -d
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    container_name: deepfake-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
