version: '3.8'

services:
  backend:
    build: ./backend
    container_name: deepfake-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  frontend:
    build: 
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: deepfake-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
